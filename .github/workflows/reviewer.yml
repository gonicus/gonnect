name: OpenRabbit Reviewer

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: openrabbit-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  review:
    if: >
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '@open-rabbit review') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR Code
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.issue.number }}/head

      - name: Inject pull_request into event payload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail

          HTTP_CODE=$(curl -s -o /tmp/pr.json -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/$PR_NUMBER")

          echo "GitHub API status: $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::PR-access failed (HTTP $HTTP_CODE)"
            cat /tmp/pr.json
            exit 1
          fi

          jq --slurpfile pr /tmp/pr.json '. + {pull_request: $pr[0]}' "$GITHUB_EVENT_PATH" > "$RUNNER_TEMP/event.json"
          echo "GITHUB_EVENT_PATH=$RUNNER_TEMP/event.json" >> "$GITHUB_ENV"

          echo "DEBUG: $(jq '.pull_request.number' "$RUNNER_TEMP/event.json")"

      - name: Run OpenRabbit Review
        uses: aryanbrite/openrabbit@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          llm_api_key: ${{ secrets.LLM_API_KEY }}
          llm_provider: openrouter
          llm_model: openrouter/free
          review_mode: both
          tone_mode: balanced
